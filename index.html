<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=3840, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <title>KCL Robotics Lab Dashboard</title>
  <!-- <meta http-equiv="refresh" content="300"> -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..900&family=Inter:opsz,wght@14..32,300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- Light background effects -->
  <div class="light-effects" aria-hidden="true"></div>

  <main class="screen">
    <!-- ── HERO: Clock + Branding ── -->
    <header class="hero panel">
      <div class="hero-left">
        <div class="brand">
          <div class="brand-logo">KCL</div>
          <div class="brand-text">
            <h1>Electronics &amp; Robotics Lab</h1>
            <span class="brand-sub">Makerspace Dashboard</span>
          </div>
        </div>
      </div>
      <div class="hero-right">
        <div class="clock-wrap">
          <div class="date-greeting">
            <span id="greeting" class="greeting">Good morning</span>
            <span class="dot-sep">•</span>
            <span id="date" class="date-display">Monday, 1 January</span>
          </div>
          <div class="time-primary">
            <span id="time" class="time-display">00:00</span>
          </div>
        </div>
      </div>
    </header>

    <!-- ── MEDIA SLIDESHOW ── -->
    <section class="media panel">
      <div class="slideshow" id="slideshow-container">
        <!-- Slides will be injected here via app.js -->
      </div>
      <div class="slideshow-progress">
        <div class="slideshow-progress-bar" id="slides-progress"></div>
      </div>
      <div class="slideshow-caption" id="slideshow-caption"></div>
    </section>

    <!-- ── RIGHT SIDEBAR: Status, Notices, Schedule ── -->
    <aside class="right-pane">
      
      <!-- Status & Equipment Info -->
      <section class="status-panel panel">
        <div class="lab-status">
          <div class="status-badge open">
            <span class="status-dot"></span>
            <span>Lab Open</span>
          </div>
          <div class="status-hours">Closes at 21:00</div>
        </div>
        
        <div class="equipment-grid" id="equipment-list">
          <!-- Injected via app.js -->
        </div>
      </section>

      <!-- Up Next / Schedule -->
      <section class="schedule-panel panel">
        <div class="panel-header">
          <h2>Today's Schedule</h2>
        </div>
        <div class="next-up" id="next-up">
          <div class="next-up-event" id="next-up-text">—</div>
          <div class="next-up-countdown" id="next-up-countdown"></div>
        </div>
        <div class="event-list" id="event-list">
          <!-- Injected via app.js -->
        </div>
      </section>

      <!-- Notices -->
      <section class="notices-panel panel">
        <div class="panel-header">
          <h2>Important Notices</h2>
        </div>
        <div class="notice-list" id="notice-list">
          <!-- Injected via app.js -->
        </div>
      </section>

    </aside>

    <!-- ── TICKER ── -->
    <footer class="ticker-wrap panel">
      <div class="ticker-label">LATEST</div>
      <div class="ticker-track" id="ticker-track">
        <div class="ticker-segment" id="ticker-segment">
          <!-- Injected via app.js -->
        </div>
      </div>
    </footer>
  </main>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
